<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Project</title>
    <style>
        .container
        {
        background-color: white;
        border: 2px solid black;
        width: 300px;
        height: 200px;
        position: relative;
        border-radius: 10px;
        }
        #box{
            background-color: red;
            width: 100px;
            height: 100px;
            border: 2px solid black;
            border-radius: 50px;
            position: absolute;
            left: 30%;
            top: 40px;

        }
    </style>
</head>
<body style="background-color: black;">
    <div class="container">
    <div id="box"></div>
    </div>
    <a href="flag2.html">second flag</a>
</body>
</html>
