<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Project</title>
    <style>
        *{
            box-sizing: border-box;
        }
        #container{
            position:relative;
            border: 2px solid black;
            background-color: red;
            width: 300px;
            height: 200px;
        }
        #box1{
            position:absolute;
            border: 2px solid black;
            background-color:rgb(4, 4, 241);
            width: 298px;
            height: 100px;
            top: 50px;

        }
        #box2{
            position:absolute;
            border: 2px solid black;
            background-color:rgb(245, 245, 245);
            border-radius: 50%;
            width: 100px;
            height: 100px;
            left: 100px;
            
        }
    </style>
</head>
<body>
    <div id="container">
     <div id="box1">
        <div id="box2"></div>
     </div>
     
     
    </div>
    <a href="index.html">Back</a>
</body>
</html>
