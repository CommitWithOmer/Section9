<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Project</title>
    <style>
        #container{
            background-color: rgb(51, 67, 217);
            border: 2px solid black;
            width: 300px;
            height: 200px;
            position: relative;
        }
        #box1{
            background-color: yellow;
            
            width: 300px;
            height: 20px;
            position: absolute;
            top: 90px;
            
        }
        #box2{
            background-color: yellow;
            
            width: 20px;
            height: 200px;
            position: absolute;
            left: 90px;
            
            
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="box1"></div>
        <div id="box2"></div>
    </div>
    <a href="index.html">Back</a>
</body>
</html>
